<script>
const questions=[{text:"¿Qué opina sobre la reforma a la salud impulsada por el gobierno Petro?",context:"El gobierno Petro ha buscado reformar el sistema de salud, eliminando la función fiscal de las EPS y reduciendo su poder en favor de un sistema en el que el Estado tiene más gestión directa sobre la prestación de servicios. La reforma fue declarada inexequible por la Corte Constitucional por vicios de procedimiento, aunque el gobierno ha continuado implementando partes de ella por decreto."},{text:"¿Qué opina sobre la reforma pensional aprobada en el gobierno Petro?",context:"El gobierno Petro reformó el sistema pensional con una estructura de pilares: todos los trabajadores aportan a Colpensiones hasta 2.3 salarios mínimos, y solo los aportes que superen ese umbral pueden ir a fondos privados. Esto aumenta significativamente el flujo de recursos hacia Colpensiones y reduce el de los fondos privados, lo que sus críticos señalan como un riesgo para la sostenibilidad fiscal a largo plazo."},{text:"¿Qué opina sobre la política de Paz Total?",context:"La Paz Total fue la propuesta del gobierno Petro para establecer conversaciones con todos los grupos armados al margen de la ley, como 'profundización' del Acuerdo Final de Paz. Ha sido ampliamente criticada por su incapacidad de lograr desmovilizaciones efectivas y por el incremento del poder de los grupos armados, en un contexto de desmejora generalizada de la seguridad."},{text:"¿Qué opina sobre suspender la exploración y explotación de petróleo y gas natural?",context:"El gobierno Petro tomó la decisión de detener nuevos procesos de exploración de combustibles fósiles para avanzar en la decarbonización frente al calentamiento global. Colombia perdió la autosuficiencia petrolera en diciembre de 2024 e importó cerca del 17% de su demanda nacional en el primer semestre de 2025, generando una mayor dependencia de petróleo extranjero y presión sobre las finanzas públicas."},{text:"¿Está a favor de la utilización de fracturación hidráulica (fracking) para asegurar la soberanía energética de Colombia?",context:"El fracking es una estrategia de desarrollo de nuevos recursos de hidrocarburos mediante la inyección de agua o químicos a alta presión para generar nuevos conductos en pozos existentes. Los efectos ambientales a largo plazo no están del todo conocidos y su uso es controversial. Colombia tiene reservas potenciales significativas que podrían explorarse con esta técnica."},{text:"¿Cree que detener la deforestación debe ser una prioridad del próximo gobierno?",context:"La deforestación es la principal fuente de emisiones de carbono en Colombia. La quema de la Amazonía ha sido marcadamente reducida desde el inicio del gobierno actual, aunque continúa. Algunos programas de gobierno incluyen propuestas explícitas de cero deforestación, pero en términos generales el tema recibe menos atención programática que otros ejes como seguridad o economía."},{text:"¿Qué opina sobre la suspensión de relaciones diplomáticas con el gobierno de Israel?",context:"Colombia ha sido uno de los principales impulsores del rechazo diplomático hacia Israel por su ataque a Gaza. La Corte Internacional de Justicia ha encontrado que dicho ataque incluye tácticas violatorias al Derecho Internacional Humanitario, y existe un caso razonable de genocidio. Parte de la oposición considera a Israel un aliado natural y socio comercial estratégico del sector defensa, y defiende mantener las relaciones diplomáticas."},{text:"¿Qué opina sobre el enfriamiento de relaciones con el gobierno de Donald Trump?",context:"Históricamente, Colombia ha sido el aliado más cercano de Estados Unidos en la región. El gobierno actual se ha distanciado de esta posición, buscando cooperación con otros países del Sur Global e instituciones multilaterales. Esto ha generado tensiones con Washington y pone en riesgo la estabilidad comercial con el principal socio económico del país."},{text:"¿Apoya un cambio de régimen en Venezuela?",context:"Venezuela atraviesa una situación de cambio político tras una incursión militar estadounidense que resultó en la captura de Nicolás Maduro. Con tácito apoyo de Estados Unidos, el país se ha abierto a la inversión extranjera, aunque por ahora no se observan cambios importantes en su calidad democrática ni en la cúpula gobernante."},{text:"¿Qué opina sobre la redistribución de tierras a campesinos como eje de la Reforma Rural Integral?",context:"Una de las banderas del gobierno actual ha sido la compra y distribución de más de 700.000 hectáreas y la formalización de más de 1.8 millones de hectáreas a campesinos en situación de informalidad. Se presenta la desigualdad en la tenencia de tierra —donde el 10% más rico posee el 81% de las tierras cultivables— como una de las causas estructurales del conflicto armado colombiano."},{text:"¿Qué opina sobre el Acuerdo Final de Paz de 2016?",context:""},{text:"¿El Gobierno debe seguir subiendo el salario mínimo significativamente por encima de tasas de inflación?",context:"Los últimos dos gobiernos han tenido subidas históricamente altas del salario mínimo ante falta de concertación entre sindicatos y gremios empresariales. El alza de 2026 fue del 23%, la más alta desde 1997. El Gobierno defiende estas alzas con base en la necesidad de mejorar las condiciones de los colombianos más pobres, mientras que sus críticos argumentan que el crecimiento rápido del salario mínimo genera problemas para los empresarios y presiones inflacionarias. Algunos candidatos han propuesto reformar el mecanismo de negociación para que el Gobierno no tenga poder unilateral sobre el resultado."},{text:"Ante oposición del Congreso, las Cortes, el Banco de la República y otros organismos de control, ¿el Presidente debe priorizar el cumplimiento de sus metas sobre respetar el balance de poderes?",context:"Ningún candidato tendrá mayoría asegurada en el Congreso, lo que dificultará la ejecución de reformas de fondo. Gobiernos anteriores han buscado debilitar el balance de poderes argumentando que deben cumplir sus promesas electorales. La tensión entre eficacia ejecutiva e independencia institucional es uno de los debates más profundos de la democracia colombiana."},{text:"¿Qué opina sobre la suspensión de la Regla Fiscal para favorecer el gasto público pese a la crisis de recaudación?",context:"El gobierno declaró un estado de emergencia económica para enfrentar un déficit fiscal agravado por caída en el recaudo, subsidios energéticos y deuda acumulada del FEPC. El Consejo de Estado tumbó la emergencia por inconstitucional, pero el endeudamiento persiste y amenaza la estabilidad económica a largo plazo."},{text:"¿Está de acuerdo con privilegiar la inversión nacional sobre la inversión internacional?",context:"El gobierno actual ha propuesto medidas proteccionistas en el ahorro, incluyendo limitaciones a la inversión en el extranjero de fondos pensionales. También ha sugerido alejarse de sistemas tradicionales de arbitraje de inversión y ha denunciado varios Tratados Bilaterales de Inversión."},{text:"¿Está de acuerdo con el derecho de las mujeres a interrumpir voluntariamente su embarazo?",context:"La Corte Constitucional despenalizó el aborto hasta la semana 24 de gestación en 2022, y lo permite sin límite de tiempo en tres causales: violación, malformación del feto incompatible con la vida, y riesgo para la salud o vida de la madre. Colombia es uno de los pocos países de América Latina con una regulación amplia en esta materia, lo que genera debate político y social permanente."},{text:"¿Está de acuerdo con la igualdad constitucionalmente reconocida de la comunidad LGBT, incluida la posibilidad de adopción?",context:"La Corte Constitucional y la Corte Suprema de Justicia han reconocido progresivamente derechos a las parejas del mismo sexo en Colombia, incluyendo el matrimonio igualitario (2016) y la adopción (2015). Estos derechos son reconocidos en la jurisprudencia pero no están consagrados explícitamente en la Constitución, lo que los hace potencialmente reversibles vía reforma constitucional."},{text:"¿Está de acuerdo con la legalización recreacional de la marihuana?",context:"Colombia es el mayor productor mundial de cocaína y tiene una larga historia de violencia ligada al narcotráfico. El debate sobre la legalización del cannabis recreacional se enmarca en una discusión más amplia sobre si el prohibicionismo ha fracasado como política pública. Varios países y estados han legalizado el cannabis recreacional con resultados mixtos en salud pública y reducción del crimen organizado."},{text:"¿Está de acuerdo con reemplazar el sistema de educación pública primaria por vales escolares?",context:"El sistema de vales escolares es un subsidio que permite a los padres elegir la escuela privada a la que asistan sus hijos, cubriendo parte de la matrícula con recursos públicos. Sus defensores argumentan que genera competencia y mejora la calidad educativa; sus críticos sostienen que debilita la educación pública y profundiza desigualdades."},{text:"¿Está de acuerdo con una Reforma a la Educación que reevalúe la Ley 30?",context:"El movimiento estudiantil ha apoyado históricamente una revisión a la Ley 30 de 1992, para recuperar la inversión directa del Estado en la educación pública superior en detrimento de esquemas de becas para universidades privadas. La Ley 30 congeló el presupuesto real de las universidades públicas, generando un déficit acumulado que ha deteriorado su infraestructura y calidad."},{text:"¿Está de acuerdo con la retoma de la aspersión aérea como herramienta en la lucha contra el narcotráfico?",context:"La aspersión aérea con glifosato fue suspendida en 2015 por la Corte Constitucional tras una decisión de la OMS que clasificó el herbicida como probable cancerígeno. Fue la principal herramienta de erradicación de cultivos de coca durante varios gobiernos. Sus defensores argumentan que es la única forma eficaz de reducir el área cultivada a gran escala; sus críticos señalan sus efectos sobre la salud, los ecosistemas y los cultivos lícitos de campesinos."},{text:"¿Está de acuerdo con la limitación del derecho a la protesta, como la prohibición de bloquear vías o la limitación a paros de sindicatos como FECODE?",context:"El derecho a la protesta está consagrado en la Constitución colombiana, pero su ejercicio ha generado tensiones cuando implica bloqueos de vías u otras perturbaciones del orden público. Partidos de derecha y centroderecha han propuesto legislación que limite estas modalidades de protesta; la izquierda y los sindicatos las defienden como formas legítimas de presión social y laboral."},{text:"En general, ¿apruebas o desapruebas la gestión del gobierno de Gustavo Petro?",context:""},{text:"¿Qué opina sobre convocar una Asamblea Nacional Constituyente?",context:"El gobierno actual se ha quejado ampliamente de la oposición política e institucional a medidas de cambio. Como respuesta, ha propuesto una Asamblea Constituyente que permitiría implementar reformas de fondo por fuera de los pesos y contrapesos institucionales ordinarios."}];

const labels5=["Muy en contra","Algo en contra","Neutral","Algo a favor","Muy a favor"];
const impLabels=["Nada importante","Poco importante","Algo importante","Importante","Muy importante"];

let current=0,answers=new Array(TOTAL).fill(null),weights=new Array(TOTAL).fill(3);

function toggleCtx(btn){
  const ctx=btn.nextElementSibling,arrow=btn.querySelector('.ctx-arrow'),isOpen=ctx.classList.contains('visible');
  ctx.classList.toggle('visible',!isOpen);arrow.classList.toggle('open',!isOpen);
  btn.lastChild.textContent=isOpen?' ¿Qué significa esto?':' Ocultar contexto';
}

function renderQ(){
  const q=questions[current],curAns=answers[current];
  const ctxHtml=q.context?`<button class="ctx-toggle" onclick="toggleCtx(this)" type="button"><i class="ctx-arrow">▶</i> ¿Qué significa esto?</button><div class="context">${q.context}</div>`:'';
  const optsHtml=labels5.map((lbl,i)=>{const v=i+1;return`<button class="opt${curAns===v?' s'+v:''}" onclick="pick(${v})">${lbl}</button>`;}).join('');
  const impHtml=`<div class="importance-wrap"><div class="importance-label">¿Qué tan importante es este tema para ti?</div><div class="imp-opts">${impLabels.map((lbl,i)=>`<button class="imp-btn${weights[current]===i+1?' imp-sel':''}" onclick="pickWeight(${i+1})">${lbl}</button>`).join('')}</div></div>`;
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<div class="qnum">Pregunta ${current+1} de ${TOTAL}</div><div class="qtext">${q.text}</div>${ctxHtml}<div class="opts-wrap"><div class="opts-row" id="opts">${optsHtml}</div><button class="opt-ns${curAns==='ns'?' sns':''}" id="opt-ns" onclick="pickNS()">No sé / prefiere no responder</button></div>${impHtml}`;
  const container=document.getElementById('q-container');container.innerHTML='';container.appendChild(card);

  document.getElementById('btn-next').textContent=current===TOTAL-1?'Ver resultados':'Siguiente';

function pick(v){
  answers[current]=v;
  document.querySelectorAll('.opt').forEach((b,i)=>{b.className='opt'+(i+1===v?' s'+v:'');});
  document.getElementById('opt-ns').className='opt-ns';
  document.getElementById('warn').style.display='none';
}
function pickNS(){

  document.getElementById('warn').style.display='none';
}
function pickWeight(w){
  weights[current]=w;
  document.querySelectorAll('.imp-btn').forEach((b,i)=>{b.className='imp-btn'+(i+1===w?' imp-sel':'');});
}
function updateProgress(){
  const ans=answers.filter(a=>a!==null).length,pct=Math.round(ans/TOTAL*100);
  document.getElementById('prog-text').textContent=`Pregunta ${current+1} de ${TOTAL}`;
  document.getElementById('prog-pct').textContent=pct+'% completado';
  document.getElementById('prog-fill').style.width=pct+'%';
}
function nextQ(){
  if(answers[current]===null){document.getElementById('warn').style.display='block';return;}
  if(current<TOTAL-1){current++;renderQ();}else showResultsS1();
}
function prevQ(){if(current>0){current--;renderQ();}}

function score1(cand){
  let total=0,max=0;
  answers.forEach((a,i)=>{
    if(a===null||a==='ns')return;
    const w=weights[i]/3;
    total+=(4-Math.abs(a-cand.pos[i]))*w;max+=4*w;
  });
  return max>0?(total/max):0;
}

function userCoords(){
  let econSum=0,cultSum=0,econW=0,cultW=0;
  answers.forEach((a,i)=>{
    if(a===null||a==='ns')return;
    const w=weights[i]/3,val=(a-3)/2;
    if(qAxes[i].econ!==0){econSum+=val*qAxes[i].econ*w;econW+=w;}
    if(qAxes[i].cult!==0){cultSum+=val*qAxes[i].cult*w;cultW+=w;}
  });
  return{econ:Math.max(-5,Math.min(5,econW>0?econSum/econW*5:0)),cult:Math.max(-5,Math.min(5,cultW>0?cultSum/cultW*5:0))};
}

    </div>
    <p style="font-size:11px;color:#aaa;margin-top:8px;line-height:1.6;">Las posiciones de los candidatos son aproximaciones editoriales basadas en sus programas. La tuya se calcula automáticamente de sus respuestas.</p>`;
}

function buildCompareHtml(ranked){
  const ansLabels={1:"Muy en contra",2:"Algo en contra",3:"Neutral",4:"Algo a favor",5:"Muy a favor",ns:"No sé"};
  const barW={1:10,2:30,3:50,4:70,5:90,ns:50};
  let html=`<p style="font-size:13px;color:#666;margin-bottom:12px;line-height:1.6;">Tu respuesta (negro) comparada con la posición de cada candidato en cada tema. ✓ = acuerdo total, ≈ = acuerdo parcial.</p>`;
  questions.forEach((q,i)=>{
    const userAns=answers[i];if(userAns===null)return;
    html+=`<div class="compare-q"><div class="compare-qtitle">${i+1}. ${q.text}</div>`;
    const uW=barW[userAns]||50;
    html+=`<div class="compare-row"><div class="compare-who" style="color:#111">Usted</div><div class="compare-bar-bg"><div class="compare-bar-fill" style="width:${uW}%;background:#1a1a1a"></div></div><div class="compare-val" style="color:#111;font-weight:700">${ansLabels[userAns]||'No sé'}</div></div>`;
    ranked.forEach(c=>{
      const cPos=c.pos[i],cW=barW[cPos]||50;
      const diff=userAns==='ns'?null:Math.abs(userAns-cPos);
      const icon=diff===0?'✓':diff===1?'≈':'';
      html+=`<div class="compare-row"><div class="compare-who" style="color:${c.color}">${c.initials}</div><div class="compare-bar-bg"><div class="compare-bar-fill" style="width:${cW}%;background:${c.color}"></div></div><div class="compare-val" style="color:${c.color}">${ansLabels[cPos]} ${icon}</div></div>`;
    });
    html+=`</div>`;
  });
  return html;
}

function renderResults(scoresFn,title,subtitle,showS2){
  const ranked=candidates.map((c,ci)=>({...c,ci,pct:Math.round((scoresFn?scoresFn(c,ci):score1(c))*100)})).sort((a,b)=>b.pct-a.pct);

  document.getElementById('quiz-section').style.display='none';

        <div style="width:8px;height:8px;border-radius:50%;background:${c.color};flex-shrink:0;margin-top:4px;"></div>
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:700;color:${c.color};margin-bottom:2px;">${c.name}${isChosen?' <span style="background:'+c.color+';color:#fff;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:4px;">Usted eligió esta</span>':''}</div>
          <div style="font-size:12px;color:#444;line-height:1.5;">${o.text}</div>
        </div>
      </div>`;
    });
    if(chosen==='ns'){
      html+=`<div style="padding:7px 9px;border-radius:7px;background:#f5f4f0;border:1px dashed #ccc;font-size:12px;color:#888;font-style:italic;">Usted respondió: No sé / ninguna me convence del todo</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

function showFinalResults(){
  const s2bonus=new Array(candidates.length).fill(0);let s2count=0;
  s2answers.forEach(a=>{if(a!==null&&a!=='ns'){s2bonus[a]+=4;s2count++;}});
  const s2max=s2count*4;
  renderResults((c,ci)=>{
    const s1=score1(c),s2=s2max>0?s2bonus[ci]/s2max:s1;return(s1*2+s2)/3;
  },'Tus resultados finales','Combinación de sus posiciones ideológicas (sección 1) y las propuestas concretas que eligió (sección 2).',false);
}

function restartQuiz(){
  current=0;answers=new Array(TOTAL).fill(null);weights=new Array(TOTAL).fill(3);
  s2current=0;s2answers=new Array(s2questions.length).fill(null);
  document.getElementById('results-section').style.display='none';
  document.getElementById('s2-section').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  renderQ();
}

renderQ();
</script>
