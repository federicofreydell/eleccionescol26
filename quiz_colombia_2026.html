let current = 0;
let answers = new Array(TOTAL).fill(null);
let weights = new Array(TOTAL).fill(3);

const impLabels = ['Poco importante','Algo importante','Neutral','Importante','Muy importante'];

function toggleCtx(btn) {
  const ctx = btn.nextElementSibling;
  const arrow = btn.querySelector('.ctx-arrow');
  const isOpen = ctx.classList.contains('visible');
  ctx.classList.toggle('visible', !isOpen);
  arrow.classList.toggle('open', !isOpen);
  btn.querySelector('i').nextSibling.textContent = isOpen ? ' ¿Qué significa esto?' : ' Ocultar contexto';
}

function renderQ() {
  const container = document.getElementById('q-container');
  container.innerHTML = '';
  const q = questions[current];
  const card = document.createElement('div');
  card.className = 'card';
  const ctxHtml = q.context
    ? `<button class="ctx-toggle" onclick="toggleCtx(this)" type="button"><i class="ctx-arrow">▶</i> ¿Qué significa esto?</button><div class="context">${q.context}</div>`
    : '';
  const impHtml = `
    <div class="importance-wrap">
      <div class="importance-label">¿Qué tan importante es este tema para ti?</div>
      <div class="imp-opts">
        ${impLabels.map((lbl, i) => `<button class="imp-btn${weights[current] === i+1 ? ' imp-sel' : ''}" onclick="pickWeight(${i+1})">${lbl}</button>`).join('')}
      </div>
    </div>`;
  card.innerHTML = `
    <div class="qnum">Pregunta ${current + 1} de ${TOTAL}</div>
    <div class="qtext">${q.text}</div>
    ${ctxHtml}
    <div class="opts" id="opts"></div>
    ${impHtml}
  `;
  container.appendChild(card);
  const row = document.getElementById('opts');
  labels.forEach((lbl, i) => {
    const v = i + 1;
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current] === v ? ' s' + v : '');
    btn.textContent = lbl;
    btn.onclick = () => pick(v);
    row.appendChild(btn);
  });
  updateProgress();
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === TOTAL - 1 ? 'Ver resultados' : 'Siguiente';
  document.getElementById('warn').style.display = 'none';
}

function pick(v) {
  answers[current] = v;
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.className = 'opt' + (i + 1 === v ? ' s' + v : '');
  });
  document.getElementById('warn').style.display = 'none';
}

function pickWeight(w) {
  weights[current] = w;
  document.querySelectorAll('.imp-btn').forEach((b, i) => {
    b.className = 'imp-btn' + (i + 1 === w ? ' imp-sel' : '');
  });
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((answered / TOTAL) * 100);
  document.getElementById('prog-text').textContent = `Pregunta ${current + 1} de ${TOTAL}`;
  document.getElementById('prog-pct').textContent = pct + '% completado';
  document.getElementById('prog-fill').style.width = pct + '%';
}

function nextQ() {
  if (answers[current] === null) { document.getElementById('warn').style.display = 'block'; return; }
  if (current < TOTAL - 1) { current++; renderQ(); }
  else showResults();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

      { text: "Crear 7 megacárceles y promover la cadena perpetua.", cand: 4 },
      { text: "Nivelar salarios de la Policía para retener talento y asegurar diálogo con sectores sociales.", cand: 0 },
      { text: "Contratar 30.000 nuevos militares y 30.000 nuevos policías; garantizar espacios públicos libres de droga.", cand: 3 },
      { text: "Reformar las cárceles, construir 5 nuevas y aumentar en 40.000 el pie de fuerza policial. Plan integral contra el reclutamiento de menores.", cand: 2 },
      { text: "Reformar la justicia para reducir garantías a mafias; crear una Gendarmería; reasignar funcionarios de la Procuraduría a la lucha antimafia.", cand: 1 },
    ]
  },
  {
    problem: "Los grupos armados ilegales se han expandido en los últimos cuatro años, con un crecimiento del 23,5% el último año.",
    question: "Para enfrentar la expansión de grupos armados, prefiero:",
    options: [
      { text: "Abandonar la política prohibicionista de drogas y atacar la criminalidad resolviendo sus causas estructurales.", cand: 0 },
      { text: "Priorizar el desmantelamiento de redes de lavado de activos y proteger a líderes sociales y comunidades étnicas.", cand: 2 },
      { text: "Militarizar estratégicamente zonas con alta presencia armada, incluyendo la prestación de servicios básicos por militares.", cand: 3 },
      { text: "Fortalecer la Fuerza Pública, la inteligencia y la cooperación internacional contra el crimen organizado.", cand: 1 },
      { text: "Lanzar un Plan Colombia II con apoyo de EEUU e Israel; eliminar la JEP; lanzar una ofensiva militar total contra el crimen.", cand: 4 },
    ]
  },
  {
    problem: "La democracia en Colombia enfrenta una nueva oleada de violencia política. The Economist declaró el declive democrático del país por primera vez en cuatro años.",
    question: "Para revitalizar la democracia, prefiero:",
    options: [
      { text: "Mejorar la independencia judicial y reformar los mecanismos de elección de organismos de control (Fiscalía, Procuraduría, Contraloría, magistrados).", cand: 2 },
      { text: "Reformar la financiación política para garantizar la integridad de los movimientos políticos.", cand: 3 },
      { text: "Crear mesas de diálogo en todos los niveles, reconocer la diversidad del país y permitir ejecución directa de obras por organizaciones comunitarias.", cand: 0 },
      { text: "Combatir las mafias con justicia restaurativa para mantener el tejido social mientras se endurece la lucha contra el crimen organizado.", cand: 1 },
      { text: "Reducir el aparato estatal en un 40% y eliminar las ideologías extremas del sistema educativo.", cand: 4 },
    ]
  },
  {
    problem: "Colombia se encuentra en su mayor déficit fiscal de la historia, el segundo más alto del mundo en 2025.",
    question: "Para resolver la crisis fiscal, prefiero:",
    options: [
      { text: "Implementar una Ley de Austeridad Republicana que reduzca los gastos suntuosos del Estado manteniendo el gasto social.", cand: 0 },
      { text: "Revisar la eficacia de los programas sociales, acordar un plan de reducción del déficit con organismos internacionales y modernizar la DIAN.", cand: 2 },
      { text: "Retomar la regla fiscal y limitar el gasto público al crecimiento económico del país, generando condiciones para la inversión.", cand: 1 },
      { text: "Refinanciar la deuda pública con fondos internacionales y retomar de inmediato la Regla Fiscal.", cand: 3 },
      { text: "Recortar el gobierno en un 40%, recuperar 25 billones anuales eliminando la corrupción y ampliar la base tributaria.", cand: 4 },
    ]
  }
];

let s2current = 0;
let s2answers = new Array(s2questions.length).fill(null); // índice del candidato elegido

// ── PUNTUACIÓN ──────────────────────────────────────────────────────────────
function score1(cand) {
  let total = 0, max = 0;
  answers.forEach((a, i) => {
    if (a !== null) {
      const w = weights[i] / 3;
      total += (4 - Math.abs(a - cand.pos[i])) * w;
      max += 4 * w;
    }
  });
  return max > 0 ? (total / max) : 0;
}

function buildResultsHtml(title, subtitle, scoresFn, showS2btn) {
  const ranked = candidates.map((c, ci) => ({ ...c, ci, pct: Math.round(scoresFn(c, ci) * 100) })).sort((a, b) => b.pct - a.pct);
  let html = `<h1 style="font-size:22px;font-weight:600;margin-bottom:6px;">${title}</h1>
    <p class="subtitle">${subtitle}</p>`;
  ranked.forEach((c, idx) => {
    html += `
      <div class="cand-card ${idx === 0 ? 'top' : ''}">
        <div class="avatar" style="background:${c.bg};color:${c.tc}">${c.initials}</div>
        <div style="flex:1">
          ${idx === 0 ? '<span class="badge">Mayor afinidad</span>' : ''}
          <div class="cname">${c.name}</div>
          <div class="cparty">${c.party}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${c.pct}%;background:${c.color}"></div></div>
          <div class="pct">${c.pct}% de afinidad</div>
        </div>
      </div>`;
  });
  if (showS2btn) {
    html += `
      <div style="margin-top:1.5rem;padding:1rem 1.25rem;background:#f8f7f3;border-radius:10px;border-left:2px solid #378ADD;">
        <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:4px;">¿Quieres afinar tu resultado?</div>
        <div style="font-size:13px;color:#555;margin-bottom:12px;line-height:1.6;">La sección 2 te presenta propuestas concretas de cada candidato ante 6 problemas del país. Elige la que más te convenza — es opcional y tarda menos de 2 minutos.</div>
        <button class="btn primary" onclick="startS2()">Continuar a la sección 2 →</button>
      </div>`;
  }
  html += `<div class="disclaimer" style="margin-top:1rem;">Este quiz es una herramienta orientativa basada en los programas de gobierno y posiciones públicas de cada candidato. Las afinidades son aproximaciones y no reemplazan la lectura directa de sus propuestas.</div>
    <div style="margin-top:1rem"><button class="btn" onclick="restartQuiz()">Volver a empezar</button></div>`;
  return html;
}

function showResults() {
  document.getElementById('quiz-section').style.display = 'none';
  const rs = document.getElementById('results-section');
  rs.style.display = 'block';
  rs.innerHTML = buildResultsHtml(
    'Tus resultados — Sección 1',
    'Basado en tus posiciones sobre los grandes temas del debate político colombiano.',
    (c) => score1(c),
    true
  );
}

// ── SECCIÓN 2 ──────────────────────────────────────────────────────────────
function startS2() {
  s2current = 0;
  s2answers = new Array(s2questions.length).fill(null);
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('s2-section').style.display = 'block';
  renderS2();
}

function renderS2() {
  const q = s2questions[s2current];
  const STOTAL = s2questions.length;
  const pct = Math.round((s2current / STOTAL) * 100);

  // shuffle options for display but keep cand reference
  const opts = q.options.map((o, i) => ({ ...o, origIdx: i }));

  let optHtml = opts.map((o, i) => `
    <button class="s2-opt ${s2answers[s2current] === o.cand ? 's2-sel' : ''}"
      onclick="pickS2(${o.cand}, this)">
      ${o.text}
    </button>`).join('');

  document.getElementById('s2-section').innerHTML = `
    <h1 style="font-size:22px;font-weight:600;margin-bottom:6px;">Sección 2 — Propuestas concretas</h1>
    <p class="subtitle">Elige la propuesta que más te convenza. No se indica a qué candidato pertenece cada una.</p>
    <div class="progress-label" style="margin-top:1rem;">
      <span>Problema ${s2current + 1} de ${STOTAL}</span>
      <span>${pct}% completado</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card" style="margin-top:1rem;">
      <div class="qnum">Problema ${s2current + 1} de ${STOTAL}</div>
      <div style="font-size:13px;color:#555;line-height:1.65;margin-bottom:10px;padding:10px 12px;background:#f8f7f3;border-radius:8px;border-left:2px solid #ccc;">${q.problem}</div>
      <div class="qtext" style="margin-bottom:1rem;">${q.question}</div>
      <div class="s2-opts">${optHtml}</div>
    </div>
    <div class="warn" id="s2-warn" style="display:none">Por favor elige una opción antes de continuar.</div>
    <div class="nav">
      <button class="btn" onclick="prevS2()" ${s2current === 0 ? 'disabled' : ''}>Anterior</button>
      <button class="btn primary" onclick="nextS2()">${s2current === STOTAL - 1 ? 'Ver resultados finales' : 'Siguiente'}</button>
    </div>`;
}

function pickS2(candIdx, btn) {
  s2answers[s2current] = candIdx;
  document.querySelectorAll('.s2-opt').forEach(b => b.classList.remove('s2-sel'));
  btn.classList.add('s2-sel');
  document.getElementById('s2-warn').style.display = 'none';
}

function nextS2() {
  if (s2answers[s2current] === null) { document.getElementById('s2-warn').style.display = 'block'; return; }
  if (s2current < s2questions.length - 1) { s2current++; renderS2(); }
  else showFinalResults();
}

function prevS2() {
  if (s2current > 0) { s2current--; renderS2(); }
}

function showFinalResults() {
  document.getElementById('s2-section').style.display = 'none';
  const rs = document.getElementById('results-section');
  rs.style.display = 'block';

  // s2 bonus: cada elección suma 4 puntos al candidato elegido (equivale a acuerdo perfecto en s1)
  const s2bonus = new Array(candidates.length).fill(0);
  s2answers.forEach(ci => { if (ci !== null) s2bonus[ci] += 4; });
  const s2max = s2answers.filter(a => a !== null).length * 4;

  rs.innerHTML = buildResultsHtml(
    'Tus resultados finales',
    'Combinación de tus posiciones ideológicas (sección 1) y las propuestas concretas que elegiste (sección 2).',
    (c, ci) => {
      const s1raw = score1(c);
      // Normalizar s2 a escala 0-1
      const s2raw = s2max > 0 ? s2bonus[ci] / s2max : 0;
      // Promedio ponderado: s1 vale 2/3, s2 vale 1/3
      return (s1raw * 2 + s2raw) / 3;
    },
    false
  );
}

function restartQuiz() {
  current = 0;
  answers = new Array(TOTAL).fill(null);
  weights = new Array(TOTAL).fill(3);
  s2current = 0;
  s2answers = new Array(s2questions.length).fill(null);
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('s2-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  renderQ();
}

renderQ();
</script>
</body>
</html>
